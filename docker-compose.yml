services:
  postgres:
    image: postgres:17-alpine
    container_name: mini_payroll_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - mini_payroll_data:/var/lib/postgresql/data

volumes:
  mini_payroll_data:
